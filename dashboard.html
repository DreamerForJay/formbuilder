<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FormBuilder — 管理後台</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--p:#673ab7;--bd:#e0e0e0}
body{background:#f0ebf8;font-family:'Segoe UI',system-ui,sans-serif}
.hdr{background:#fff;border-bottom:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.form-card{border:1px solid var(--bd)!important;border-radius:10px!important;background:#fff;transition:box-shadow .2s,transform .15s}
.form-card:hover{box-shadow:0 4px 16px rgba(103,58,183,.12);transform:translateY(-2px)}
.badge-draft{background:#f5f5f5;color:#757575;border:1px solid #e0e0e0}
.badge-published{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.stat-num{font-size:1.5rem;font-weight:700;color:var(--p)}
.empty-state{color:#bbb;padding:60px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.form-card{animation:fadeIn .2s ease}
</style>
</head>
<body>

<header class="hdr py-3 px-4">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-ui-checks-grid fs-4" style="color:var(--p)"></i>
      <span class="fw-bold fs-5" style="color:var(--p)">FormBuilder</span>
      <span class="text-muted small ms-1">管理後台</span>
    </div>
    <button class="btn text-white btn-sm px-3" style="background:var(--p)" onclick="newForm()">
      <i class="bi bi-plus-lg"></i> 新建表單
    </button>
  </div>
</header>

<div class="container py-4" style="max-width:900px">

  <!-- 統計列 -->
  <div class="row g-3 mb-4" id="statsRow"></div>

  <!-- 搜尋 & 篩選 -->
  <div class="d-flex gap-2 mb-3 flex-wrap">
    <input type="text" id="searchInput" class="form-control form-control-sm" style="max-width:260px"
           placeholder="🔍 搜尋表單標題…" oninput="renderList()">
    <select id="statusFilter" class="form-select form-select-sm" style="max-width:140px" onchange="renderList()">
      <option value="">全部狀態</option>
      <option value="draft">草稿</option>
      <option value="published">已發佈</option>
    </select>
    <select id="sortBy" class="form-select form-select-sm" style="max-width:160px" onchange="renderList()">
      <option value="newest">最新建立</option>
      <option value="oldest">最舊建立</option>
      <option value="responses">填答數排序</option>
    </select>
  </div>

  <!-- 表單列表 -->
  <div id="formList"></div>

</div>

<!-- 分享 Modal -->
<div class="modal fade" id="shareModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header" style="background:var(--p)">
        <h5 class="modal-title text-white"><i class="bi bi-share"></i> 分享表單</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <div class="input-group mb-3">
          <input type="text" id="shareUrl" class="form-control" readonly>
          <button class="btn btn-outline-secondary" onclick="copyUrl()"><i class="bi bi-clipboard"></i> 複製</button>
        </div>
        <div id="qrcode" class="d-flex justify-content-center mb-2"></div>
        <small class="text-muted">掃描 QR Code 直接填答</small>
      </div>
      <div class="modal-footer">
        <a id="fillLink" href="#" target="_blank" class="btn btn-sm text-white" style="background:var(--p)">
          <i class="bi bi-pencil-square"></i> 開啟填答頁
        </a>
        <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<!-- 刪除確認 Modal -->
<div class="modal fade" id="delModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-body text-center p-4">
        <i class="bi bi-trash3 text-danger fs-1 mb-2 d-block"></i>
        <p class="fw-semibold mb-1">確定刪除此表單？</p>
        <p class="text-muted small mb-3">所有填答資料也會一併刪除，無法復原。</p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-danger btn-sm" id="confirmDel">確定刪除</button>
          <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast text-white border-0">
    <div class="d-flex">
      <div class="toast-body fw-semibold" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
// ── Storage helpers ───────────────────────────────────────
function getForms() {
  return JSON.parse(localStorage.getItem('fb_forms') || '{}');
}
function getResponses(id) {
  return JSON.parse(localStorage.getItem(`fb_responses_${id}`) || '[]');
}

// ── 統計列 ────────────────────────────────────────────────
function renderStats() {
  const forms = Object.values(getForms());
  const total     = forms.length;
  const published = forms.filter(f => f.status === 'published').length;
  const totalResp = forms.reduce((s, f) => s + getResponses(f.id).length, 0);

  document.getElementById('statsRow').innerHTML = [
    ['bi-file-earmark-text', '表單總數', total],
    ['bi-send-check',        '已發佈',   published],
    ['bi-people',            '總填答數', totalResp],
  ].map(([icon, label, val]) => `
    <div class="col-4">
      <div class="card shadow-sm text-center py-3">
        <i class="bi ${icon} fs-4 mb-1" style="color:var(--p)"></i>
        <div class="stat-num">${val}</div>
        <div class="text-muted small">${label}</div>
      </div>
    </div>`).join('');
}

// ── 表單列表 ──────────────────────────────────────────────
function renderList() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const sort   = document.getElementById('sortBy').value;

  let forms = Object.values(getForms());

  if (q)      forms = forms.filter(f => f.title.toLowerCase().includes(q));
  if (status) forms = forms.filter(f => f.status === status);

  if (sort === 'newest')    forms.sort((a, b) => b.savedAt.localeCompare(a.savedAt));
  else if (sort === 'oldest') forms.sort((a, b) => a.savedAt.localeCompare(b.savedAt));
  else if (sort === 'responses') forms.sort((a, b) => getResponses(b.id).length - getResponses(a.id).length);

  const wrap = document.getElementById('formList');
  if (!forms.length) {
    wrap.innerHTML = `<div class="text-center empty-state">
      <i class="bi bi-inbox fs-1 d-block mb-2"></i>
      <p>${q || status ? '找不到符合的表單' : '還沒有表單，點右上角「新建表單」開始吧！'}</p>
    </div>`;
    return;
  }

  wrap.innerHTML = forms.map(f => {
    const respCount = getResponses(f.id).length;
    const date = new Date(f.savedAt).toLocaleString('zh-Hant', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    const badge = f.status === 'published'
      ? `<span class="badge badge-published"><i class="bi bi-broadcast"></i> 已發佈</span>`
      : `<span class="badge badge-draft"><i class="bi bi-pencil"></i> 草稿</span>`;
    return `
    <div class="card shadow-sm mb-3 form-card">
      <div class="card-body p-3">
        <div class="d-flex align-items-start justify-content-between gap-2 flex-wrap">
          <div class="flex-grow-1 min-width-0">
            <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
              <h6 class="mb-0 fw-bold">${esc(f.title)}</h6>
              ${badge}
            </div>
            <div class="text-muted small d-flex gap-3 flex-wrap">
              <span><i class="bi bi-clock"></i> ${date}</span>
              <span><i class="bi bi-people"></i> ${respCount} 筆填答</span>
              <span><i class="bi bi-list-ul"></i> ${(f.questions||[]).length} 題</span>
            </div>
          </div>
          <div class="d-flex gap-1 flex-shrink-0 flex-wrap">
            <a href="fill.html?id=${f.id}" target="_blank" class="btn btn-sm btn-outline-secondary" title="預覽填答">
              <i class="bi bi-eye"></i>
            </a>
            <a href="index.html?id=${f.id}" class="btn btn-sm btn-outline-secondary" title="編輯">
              <i class="bi bi-pencil"></i>
            </a>
            <a href="results.html?id=${f.id}" target="_blank" class="btn btn-sm btn-outline-secondary" title="統計">
              <i class="bi bi-bar-chart-line"></i>
            </a>
            <button class="btn btn-sm btn-outline-secondary" onclick="shareForm('${f.id}')" title="分享">
              <i class="bi bi-share"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete('${f.id}')" title="刪除">
              <i class="bi bi-trash3"></i>
            </button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── 新建表單 ──────────────────────────────────────────────
function newForm() {
  location.href = 'index.html';
}

// ── 分享 ──────────────────────────────────────────────────
function shareForm(id) {
  const url = `${location.origin}${location.pathname.replace('dashboard.html','')}fill.html?id=${id}`;
  document.getElementById('shareUrl').value = url;
  document.getElementById('fillLink').href  = url;
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, { text: url, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
  new bootstrap.Modal(document.getElementById('shareModal')).show();
}

function copyUrl() {
  navigator.clipboard.writeText(document.getElementById('shareUrl').value)
    .then(() => showToast('🔗 連結已複製！', 'success'));
}

// ── 刪除 ──────────────────────────────────────────────────
function confirmDelete(id) {
  const modal = new bootstrap.Modal(document.getElementById('delModal'));
  document.getElementById('confirmDel').onclick = () => {
    const forms = getForms();
    delete forms[id];
    localStorage.setItem('fb_forms', JSON.stringify(forms));
    localStorage.removeItem(`fb_responses_${id}`);
    modal.hide();
    renderStats();
    renderList();
    showToast('🗑️ 表單已刪除', 'success');
  };
  modal.show();
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.style.background = ({success:'#388e3c',danger:'#d32f2f',info:'#1565c0'})[type]||'#333';
  document.getElementById('toastMsg').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el, { delay: 3000 }).show();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 遷移舊資料（fb_form → fb_forms） ─────────────────────
(function migrate() {
  const old = localStorage.getItem('fb_form');
  if (!old) return;
  try {
    const f = JSON.parse(old);
    if (!f?.id) return;
    const forms = getForms();
    if (!forms[f.id]) {
      forms[f.id] = f;
      localStorage.setItem('fb_forms', JSON.stringify(forms));
      // 遷移回應
      const oldResp = localStorage.getItem('fb_responses');
      if (oldResp) localStorage.setItem(`fb_responses_${f.id}`, oldResp);
    }
    localStorage.removeItem('fb_form');
    localStorage.removeItem('fb_responses');
  } catch {}
})();

renderStats();
renderList();
</script>
</body>
</html>
